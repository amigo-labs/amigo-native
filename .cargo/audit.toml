# cargo-audit configuration for the audit-rust CI job.
#
# The CI step runs `cargo audit --deny warnings` so any new advisory —
# vulnerability OR unmaintained-package — fails the build. The list
# below carves out only the specific transitive advisories we already
# know about, with a one-line reason and the upstream that pulls them
# in. Each entry should get re-evaluated on every typst version bump.

[advisories]
ignore = [
    # `yaml-rust` is unmaintained per RUSTSEC-2024-0320. Pulled by
    # `syntect` → `typst-library` → `typst`. Typst's syntax-highlighting
    # path is the only consumer; we don't drive yaml-rust ourselves.
    "RUSTSEC-2024-0320",
    # `paste` is no longer maintained per RUSTSEC-2024-0436. Pulled by
    # `hayagriva` (typst's citation processor) and `biblatex`. No direct
    # use from our crates.
    "RUSTSEC-2024-0436",
    # `bincode 1.3.3` is unmaintained per RUSTSEC-2025-0141. Pulled by
    # `syntect` → `typst-library`. The 2.x line is maintained but
    # syntect hasn't migrated yet.
    "RUSTSEC-2025-0141",
    # `rsa 0.9.10` has a timing-sidechannel weakness (Marvin Attack)
    # per RUSTSEC-2023-0071, no upstream fix available. Pulled by
    # `jsonwebtoken 10` via the `rust_crypto` backend. The Marvin attack
    # targets RSA *decryption* (PKCS#1 v1.5 / OAEP) and our `jwt` crate
    # only does JWS sign/verify (signature operations), not JWE
    # decryption — the vulnerable code path is not reachable from our
    # API. Switching to the `aws_lc_rs` backend would avoid the dep but
    # adds cmake/perl/go to the build matrix; we prefer to keep the
    # NAPI cross-compile toolchain pure-Rust.
    "RUSTSEC-2023-0071",
    # `proc-macro-error 1.0.4` is unmaintained per RUSTSEC-2024-0370.
    # Pulled by `printpdf` → `allsorts` → `ouroboros 0.17` →
    # `ouroboros_macro`. Build-time proc-macro only, not in the runtime
    # artifact. Re-evaluate when `allsorts` bumps to an `ouroboros`
    # release that has migrated to `proc-macro-error2`.
    "RUSTSEC-2024-0370",
    # `lopdf < 0.42` can stack-overflow on deeply nested PDF objects per
    # RUSTSEC-2026-0187. The parsing path (`_pdf-parse-core`, which DOES
    # consume untrusted PDFs) was upgraded to lopdf 0.42, which has the
    # fix. The remaining lock entry is lopdf 0.39 via `printpdf 0.9.1`
    # (`_pdf-core`), and printpdf has no release on lopdf ≥0.42 yet. Our
    # `pdf` crate only *generates* PDFs from a typed spec through
    # printpdf — the vulnerable parse path is not reachable from its
    # API. Re-evaluate on the next printpdf release.
    "RUSTSEC-2026-0187",
    # `proc-macro-error2 2.0.1` is unmaintained per RUSTSEC-2026-0173.
    # Phantom lock entry: `jiff`'s optional `defmt` feature → `defmt` →
    # `defmt-macros` → `proc-macro-error2`. The feature is never enabled
    # (`cargo tree -i proc-macro-error2 --target all` finds no reverse
    # path), so it is not compiled into any artifact.
    "RUSTSEC-2026-0173",
    # `ttf-parser 0.25` is unmaintained per RUSTSEC-2026-0192. Pulled by
    # `lopdf` (both the 0.42 parse path and 0.39 via printpdf). Warning-
    # level only; re-evaluate when lopdf moves to a maintained fork.
    "RUSTSEC-2026-0192",
]
