# amigo-native docs — Cloudflare Worker (static-asset hosting)
#
# This worker has no JS code of its own; it serves the Astro build output
# from web/dist/. Cloudflare's Git integration (configured in the Workers
# dashboard) deploys this on every push to main and creates per-branch
# preview URLs for any other branch.
#
# Workers Builds reads the [build] block below and runs the listed command
# before invoking `wrangler deploy`, so web/dist/ does not need to be
# checked into the repo.
#
# Local: `pnpm run deploy:dry` to build + validate without touching
# production. `pnpm run deploy` for a manual deploy (requires
# CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID env vars).

name = "amigo-native"
compatibility_date = "2025-04-01"
workers_dev = true

[build]
command = "corepack enable && pnpm install --frozen-lockfile && pnpm run web:build"

[assets]
directory = "./web/dist"
# Astro emits one HTML file per route (incl. /packages/<slug>/index.html and
# /404.html). Static-asset routing serves those directly; unknown paths fall
# through to /404.html via the Cloudflare default 404 handler. The legacy
# data files (docs/perf-review/*.md, docs/history/*.jsonl, …) remain
# checked into the repo as the canonical content source — they are read at
# build time by the Astro project rather than served as static URLs.

# Custom domain — uncomment and set once a route is provisioned in Cloudflare.
# Until then the worker is reachable at
# https://amigo-native.<your-cf-subdomain>.workers.dev/.
#
# [[routes]]
# pattern = "amigo-native.example.com"
# custom_domain = true

# `wrangler observability` opt-in — keeps a small request-log tail visible in
# the Cloudflare dashboard for the worker. Free tier includes a generous quota.
[observability]
enabled = true

