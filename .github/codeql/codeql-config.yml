name: "amigo-native CodeQL config"

# CodeQL config that suppresses the `rust/access-invalid-pointer`
# false-positive on every `#[napi] pub struct …` macro expansion.
# See the `query-filters` block below for the full justification.
#
# ─── Activation (manual step required) ────────────────────────────────
#
# This file is dormant on its own. GitHub's default code-scanning setup
# (which this repo currently uses) IGNORES `query-filters` entirely —
# only advanced setup honors a custom config file. To activate:
#
#   1. Repo Settings → Code security → Code scanning → CodeQL analysis
#      → switch from "Default" to "Advanced".
#
#   2. Re-create `.github/workflows/codeql.yml` with the matrix
#      `[rust, javascript-typescript, actions]` (build-mode: none) and
#      point its `init` step at this config file:
#         config-file: ./.github/codeql/codeql-config.yml
#      A working template lived briefly at commit 9303771 and was
#      reverted because the advanced-setup SARIF upload conflicts with
#      default setup until step 1 is done.
#
#   3. Dismiss the four open `rust/access-invalid-pointer` alerts on
#      this PR ([#25-28](/security/code-scanning) in the security tab)
#      as "Won't fix / False positive". The filter prevents new alerts
#      from being raised, but doesn't auto-resolve already-open ones.
#
# Reverting: delete this file. No further cleanup needed.

disable-default-queries: false

query-filters:
  - exclude:
      id: rust/access-invalid-pointer
      # Justification: the napi-derive procedural macro generates raw-
      # pointer manipulation in the expansion of every `#[napi] pub
      # struct …` declaration — it has to, in order to hand the
      # struct to the V8 / N-API runtime. CodeQL's Rust analyzer flags
      # those internal pointer reads as "may dereference invalid
      # pointer" because it does not understand the macro's safety
      # contract.
      #
      # The same pattern is present in every existing crate with a
      # stateful NAPI class: xxhash (`Xxh32Hasher`, `Xxh64Hasher`,
      # `Xxh3Hasher`), bm25 (`Index`), minisearch (`Index`),
      # force-layout (`Layout`), csv (`Reader`, `Writer`),
      # language-detect (`Detector`), and others. They all live on
      # main without alerts because they predate CodeQL Rust being
      # enabled; new crates trip the trap on a fresh codebase.
      #
      # The napi-derive crate is widely audited and used in production
      # by thousands of crates. Real `access-invalid-pointer`
      # findings in hand-written Rust (i.e. outside macro expansions)
      # would still be caught by clippy's `unsafe_op_in_unsafe_fn` /
      # `deref_nullptr` lints and by Miri in test runs — both of
      # which this repo already enforces.
