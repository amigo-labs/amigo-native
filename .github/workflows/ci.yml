name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to the minimum needed to checkout the repo. Jobs that need more
# (test-conformance posts PR comments, benchmark pushes to main) override
# this at the job level.
permissions:
  contents: read

env:
  NODE_VERSION: '24'
  # Crates that intentionally stay Node.js-only and never get a WASM build.
  # Source of truth: docs/specs/expansion-2026.md § Node.js server-only tier.
  # Mirrored by .claude/skills/audit-crates/scripts/audit.mjs (NODE_ONLY_CRATES)
  # and by .github/workflows/release.yml (the publish-job WASM build gate).
  NODE_ONLY_CRATES: 'argon2 jose jwt'
  # Crates temporarily skipped in CI because of an unresolved upstream
  # build break. Mirrors `[workspace] exclude` in Cargo.toml.
  # Remove a crate from this list once it compiles again on stable rustc
  # and unexclude it in Cargo.toml in the same commit.
  #   typst — typst-library 0.14.x has an E0282 in foundations/str.rs:700
  #           on stable rustc; fixed upstream but no crates.io release yet.
  BROKEN_CRATES: 'typst'

jobs:
  # ── change detection ────────────────────────────────────────────────────
  # Runs first so per-crate jobs can decide whether to skip. Outputs:
  #   crates       — comma-separated list of changed crate dirs (excluding
  #                  `_template` and other underscore-prefixed entries).
  #   rebuildall   — "1" when any workspace-wide signal changed (root
  #                  Cargo.toml/Cargo.lock, pnpm-lock.yaml, .github/, the
  #                  template dir, or `[full-build]` in the commit msg).
  #                  Forces all crates to be built and tested.
  #   fullbench    — "1" when `[full-bench]` is in the commit message.
  #                  Consumed only by the benchmark job.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.detect.outputs.crates }}
      rebuildall: ${{ steps.detect.outputs.rebuildall }}
      fullbench: ${{ steps.detect.outputs.fullbench }}
    steps:
      - uses: actions/checkout@v6
        with:
          # PRs need full history to diff against the base branch; pushes
          # to main only need the parent commit.
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 2 }}
      - id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "$BASE_REF" --depth=1 --no-tags
            files=$(git diff --name-only "origin/$BASE_REF...HEAD")
            commit_msg=$(git log -1 --format=%B HEAD)
          else
            files=$(git diff --name-only HEAD^..HEAD)
            commit_msg=$(git log -1 --format=%B HEAD)
          fi

          # Workspace-wide changes that invalidate every crate's build.
          if echo "$files" | grep -qE '^(Cargo\.toml|Cargo\.lock|pnpm-lock\.yaml|pnpm-workspace\.yaml|\.github/workflows/|\.cargo/|crates/_template/)'; then
            rebuildall=1
          elif echo "$commit_msg" | grep -qF '[full-build]'; then
            rebuildall=1
          else
            rebuildall=0
          fi

          # Per-crate changes (excludes `_template` and any other underscore-
          # prefixed crate dirs).
          crates=$(echo "$files" \
            | { grep -E '^crates/[^_][^/]*/' || true; } \
            | sed -E 's|^crates/([^/]+)/.*|\1|' \
            | sort -u \
            | paste -sd, -)

          if echo "$commit_msg" | grep -qF '[full-bench]'; then
            fullbench=1
          else
            fullbench=0
          fi

          echo "crates=$crates" >> "$GITHUB_OUTPUT"
          echo "rebuildall=$rebuildall" >> "$GITHUB_OUTPUT"
          echo "fullbench=$fullbench" >> "$GITHUB_OUTPUT"
          echo "Detected changed crates: ${crates:-<none>}"
          echo "Rebuild-all: $rebuildall"
          echo "Full-bench: $fullbench"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-test
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check crate registry is in sync
        run: node scripts/sync-registry.mjs --check
      - run: pnpm run lint

  audit-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # taiki-e/install-action downloads a prebuilt cargo-audit binary
      # from the upstream release page (~3s) and caches it across runs;
      # `cargo install --locked cargo-audit` rebuilt it from source on
      # every push (~2 minutes plus crates.io flake risk).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo audit --deny warnings

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-test
      - run: cargo test --workspace

  # ── WASM test (wasm-bindgen-test under Node) ─────────────────────────────
  # Builds and tests every crate's `wasm/` sub-crate using wasm-pack's Node
  # target. Browser-headless (Chrome/Firefox) is deferred to a follow-up —
  # wasm-bindgen-test semantics are identical between targets and Node is
  # ~3× faster in CI. NODE_ONLY_CRATES are skipped: they have no wasm/ dir.
  wasm-test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.rebuildall == '1' || needs.detect-changes.outputs.crates != ''
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-test
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: Pre-flight diagnostics
        shell: bash
        run: |
          which wasm-pack
          wasm-pack --version
          which node
          node --version
      - name: Test wasm sub-crates
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ needs.detect-changes.outputs.rebuildall }}" = "1" ]; then
            wasm_dirs=$(ls -d crates/*/wasm 2>/dev/null || true)
          else
            wasm_dirs=""
            for c in $(echo "${{ needs.detect-changes.outputs.crates }}" | tr ',' ' '); do
              if echo " $NODE_ONLY_CRATES " | grep -q " $c "; then
                echo "::notice::Skipping wasm-test for $c (Node-only group)"
                continue
              fi
              [ -d "crates/$c/wasm" ] && wasm_dirs="$wasm_dirs crates/$c/wasm"
            done
          fi
          if [ -z "$wasm_dirs" ]; then
            echo "No wasm sub-crates to test."
            exit 0
          fi
          for dir in $wasm_dirs; do
            crate=$(basename $(dirname "$dir"))
            case "$crate" in _*)
              # crates/_template/wasm is a scaffold (manifests are *.tmpl), not a crate
              continue ;;
            esac
            if echo " $NODE_ONLY_CRATES " | grep -q " $crate "; then
              continue
            fi
            if echo " $BROKEN_CRATES " | grep -q " $crate "; then
              echo "::notice::Skipping wasm-test for $crate (in BROKEN_CRATES)"
              continue
            fi
            echo "::group::wasm-pack test $dir"
            (cd "$dir" && wasm-pack test --node)
            echo "::endgroup::"
          done

  # ── Bundle size report (warn-only) ───────────────────────────────────────
  # Builds each wasm sub-crate with --target bundler --release, runs
  # wasm-opt -Oz, gzips, and reports size to GITHUB_STEP_SUMMARY. Per
  # expansion-2026.md D2 the budget is 500 KB gzipped, warn-only on
  # first pass — escalates to hard-fail at baseline × 1.15 after one
  # full release cycle of collected baselines.
  #
  # During the dual-target rollout per-crate build failures are tolerated
  # (they show as ❌ in the summary table) — the job only fails if NO crate
  # built successfully. This keeps the size signal flowing while specific
  # crates' wasm bindings land one by one.
  bundle-size:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.rebuildall == '1' || needs.detect-changes.outputs.crates != ''
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-bundle-size
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack,wasm-bindgen-cli
      - name: Install binaryen
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen
      - name: Pre-flight diagnostics
        shell: bash
        run: |
          which wasm-pack && wasm-pack --version
          which wasm-bindgen && wasm-bindgen --version
          which wasm-opt && wasm-opt --version
      - name: Build and measure
        shell: bash
        run: |
          set -uo pipefail
          BUDGET=512000
          if [ "${{ needs.detect-changes.outputs.rebuildall }}" = "1" ]; then
            wasm_dirs=$(ls -d crates/*/wasm 2>/dev/null || true)
          else
            wasm_dirs=""
            for c in $(echo "${{ needs.detect-changes.outputs.crates }}" | tr ',' ' '); do
              if echo " $NODE_ONLY_CRATES " | grep -q " $c "; then continue; fi
              [ -d "crates/$c/wasm" ] && wasm_dirs="$wasm_dirs crates/$c/wasm"
            done
          fi
          if [ -z "$wasm_dirs" ]; then
            echo "No wasm sub-crates to measure."
            exit 0
          fi
          printf '| Crate | Raw .wasm | wasm-opt -Oz | Gzipped | Status |\n' >> "$GITHUB_STEP_SUMMARY"
          printf '| :--- | ---: | ---: | ---: | :--- |\n' >> "$GITHUB_STEP_SUMMARY"
          built=0
          failed=0
          for dir in $wasm_dirs; do
            crate=$(basename $(dirname "$dir"))
            # crates/_template/wasm is a scaffold (manifests are *.tmpl), not a crate
            case "$crate" in _*) continue ;; esac
            if echo " $NODE_ONLY_CRATES " | grep -q " $crate "; then continue; fi
            if echo " $BROKEN_CRATES " | grep -q " $crate "; then
              echo "::notice::Skipping bundle-size for $crate (in BROKEN_CRATES)"
              continue
            fi
            echo "::group::bundle-size $crate"
            if ! (cd "$dir" && wasm-pack build --target bundler --release --out-dir pkg); then
              echo "::warning::wasm-pack build failed for $crate"
              printf '| %s | — | — | — | ❌ build failed |\n' "$crate" >> "$GITHUB_STEP_SUMMARY"
              failed=$((failed + 1))
              echo "::endgroup::"
              continue
            fi
            wasm=$(ls "$dir"/pkg/*_bg.wasm 2>/dev/null | head -1)
            if [ -z "$wasm" ]; then
              echo "::warning::no .wasm produced for $crate"
              printf '| %s | — | — | — | ❌ no .wasm |\n' "$crate" >> "$GITHUB_STEP_SUMMARY"
              failed=$((failed + 1))
              echo "::endgroup::"
              continue
            fi
            raw=$(stat -c%s "$wasm")
            if ! wasm-opt -Oz "$wasm" -o "$wasm.opt"; then
              echo "::warning::wasm-opt failed for $crate"
              cp "$wasm" "$wasm.opt"
            fi
            opt=$(stat -c%s "$wasm.opt")
            gz=$(gzip -c "$wasm.opt" | wc -c | tr -d ' ')
            if [ -z "$gz" ]; then gz=0; fi
            if [ "$gz" -gt "$BUDGET" ]; then
              status="⚠️ over budget"
              echo "::warning::$crate gzipped ${gz} B exceeds 500 KB budget (warn-only per D2)"
            else
              status="✅"
            fi
            printf '| %s | %s B | %s B | %s B | %s |\n' "$crate" "$raw" "$opt" "$gz" "$status" >> "$GITHUB_STEP_SUMMARY"
            built=$((built + 1))
            echo "::endgroup::"
          done
          echo "Built: $built, Failed: $failed"
          if [ "$built" = "0" ] && [ "$failed" -gt "0" ]; then
            echo "::error::All wasm crates failed to build"
            exit 1
          fi
      - name: pack-verify — tarball must ship the WASM artifact
        shell: bash
        run: |
          set -uo pipefail
          # `prepublishOnly` runs build:wasm on publish, but a local `npm pack`
          # (or a files-list typo — dashes vs underscores) can produce a tarball
          # without the wasm/pkg artifacts and the browser export resolves to
          # nothing at install time. Verify the packed file list for every
          # dual-target crate whose wasm/pkg was built in the previous step.
          failures=0
          checked=0
          for dir in crates/*/; do
            crate=$(basename "$dir")
            case "$crate" in _*) continue ;; esac
            if echo " $NODE_ONLY_CRATES " | grep -q " $crate "; then continue; fi
            if echo " $BROKEN_CRATES " | grep -q " $crate "; then continue; fi
            # Not built in this run: changed-crates mode skips untouched crates,
            # and build failures were already surfaced as warnings above.
            [ -d "crates/$crate/wasm/pkg" ] || continue
            base="amigo_$(echo "$crate" | tr '-' '_')_wasm"
            files=$(cd "crates/$crate" && npm pack --dry-run --json 2>/dev/null \
              | node -e "let d='';process.stdin.on('data',(c)=>d+=c).on('end',()=>{console.log(JSON.parse(d)[0].files.map((f)=>f.path).join('\n'))})")
            missing=""
            for f in "$base.js" "${base}_bg.js" "${base}_bg.wasm" "$base.d.ts" "${base}_bg.wasm.d.ts"; do
              if ! printf '%s\n' "$files" | grep -qx "wasm/pkg/$f"; then
                missing="$missing wasm/pkg/$f"
              fi
            done
            if [ -n "$missing" ]; then
              echo "::error::pack-verify: $crate tarball is missing:$missing"
              failures=$((failures + 1))
            fi
            checked=$((checked + 1))
          done
          echo "pack-verify: checked $checked crate(s), $failures failure(s)"
          [ "$failures" = "0" ]

  build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.rebuildall == '1' || needs.detect-changes.outputs.crates != ''
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: napi-build
      - uses: rui314/setup-mold@v1
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build crates
        # CI overrides the workspace `[profile.release]` (lto = true,
        # codegen-units = 1) with thin-LTO + 16 codegen-units via env
        # vars. Per-crate codegen is the dominant cost and goes from
        # single-threaded to parallel; mold replaces ld for a faster
        # link step. release.yml is unaffected — its builds inherit
        # Cargo.toml's full-LTO profile and ship to npm unchanged.
        # The benchmark job re-builds with full-LTO so its numbers
        # remain representative of the published binaries.
        #
        # `--workspace-concurrency=4` matches the GitHub-hosted Ubuntu
        # runner's 4 vCPUs. When only a subset of crates changed we
        # filter to those — the `Swatinem/rust-cache` step still warms
        # the workspace target/ so dependency compilation is shared
        # across runs.
        env:
          CARGO_PROFILE_RELEASE_LTO: "thin"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
        run: |
          set -euo pipefail
          # Build the BROKEN_CRATES exclusion as pnpm `--filter '!@scope/x'`.
          # `!.` excludes the workspace root — pnpm normally skips it under
          # `-r`, but as soon as any `--filter` is passed it gets pulled back
          # in, and the root's `build` script (`pnpm -r run build`) would
          # recurse without our filter and rebuild every excluded crate.
          broken_filters="--filter !."
          for b in $BROKEN_CRATES; do
            broken_filters="$broken_filters --filter !@amigo-labs/$b"
          done
          if [ "${{ needs.detect-changes.outputs.rebuildall }}" = "1" ]; then
            echo "::notice::Building all crates (rebuildall=1)"
            pnpm -r $broken_filters --workspace-concurrency=4 run build
          else
            echo "::notice::Building only: ${{ needs.detect-changes.outputs.crates }}"
            # commonmark is always built — `test-node` runs
            # render-readmes.mjs which requires the commonmark binary,
            # so partial builds that don't touch commonmark would
            # otherwise leave the artifact missing it.
            filters="--filter @amigo-labs/commonmark"
            for c in $(echo "${{ needs.detect-changes.outputs.crates }}" | tr ',' ' '); do
              if echo " $BROKEN_CRATES " | grep -q " $c "; then
                echo "::notice::Skipping build for $c (in BROKEN_CRATES)"
                continue
              fi
              filters="$filters --filter @amigo-labs/$c"
            done
            pnpm $filters --workspace-concurrency=4 run build
          fi
      - name: Upload NAPI binaries
        uses: actions/upload-artifact@v7
        with:
          name: napi-binaries
          path: |
            crates/*/*.node
            crates/*/index.js
            crates/*/index.d.ts
          retention-days: 1
          if-no-files-found: error

  test-node:
    runs-on: ubuntu-latest
    needs: [build, detect-changes]
    if: needs.detect-changes.outputs.rebuildall == '1' || needs.detect-changes.outputs.crates != ''
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download NAPI binaries
        uses: actions/download-artifact@v8
        with:
          name: napi-binaries
          path: crates/
      - name: Check rendered READMEs are in sync
        run: node scripts/render-readmes.mjs --check
      - name: Check rendered perf-reviews are in sync
        run: node scripts/render-perf-reviews.mjs --check
      - name: Test crates
        run: |
          set -euo pipefail
          # See the build job for why `!.` is required alongside the
          # BROKEN_CRATES exclusions — the root's `test` script
          # (`pnpm -r run test`) would otherwise recurse unfiltered.
          broken_filters="--filter !."
          for b in $BROKEN_CRATES; do
            broken_filters="$broken_filters --filter !@amigo-labs/$b"
          done
          if [ "${{ needs.detect-changes.outputs.rebuildall }}" = "1" ]; then
            pnpm -r $broken_filters run test
          else
            filters=""
            for c in $(echo "${{ needs.detect-changes.outputs.crates }}" | tr ',' ' '); do
              if echo " $BROKEN_CRATES " | grep -q " $c "; then
                echo "::notice::Skipping test for $c (in BROKEN_CRATES)"
                continue
              fi
              filters="$filters --filter @amigo-labs/$c"
            done
            pnpm $filters run test
          fi
      - name: Parity tests
        run: pnpm test:parity

  test-conformance:
    runs-on: ubuntu-latest
    needs: [build, detect-changes]
    if: needs.detect-changes.outputs.rebuildall == '1' || needs.detect-changes.outputs.crates != ''
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download NAPI binaries
        uses: actions/download-artifact@v8
        with:
          name: napi-binaries
          path: crates/
      - name: Run conformance suite + summary
        id: conformance
        # Summary script exits non-zero on any failure; capture the
        # status so we still post the comment, then re-fail at the end.
        run: |
          set +e
          # BROKEN_CRATES is space-separated; the script takes comma-separated.
          exclude_csv=$(echo "$BROKEN_CRATES" | tr ' ' ',')
          if [ "${{ needs.detect-changes.outputs.rebuildall }}" = "1" ]; then
            node scripts/conformance-summary.mjs --exclude "$exclude_csv"
          else
            node scripts/conformance-summary.mjs --crates "${{ needs.detect-changes.outputs.crates }}" --exclude "$exclude_csv"
          fi
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          set -e
      - name: Append summary to GITHUB_STEP_SUMMARY
        if: always() && hashFiles('conformance-summary.md') != ''
        run: cat conformance-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Post conformance summary as PR comment
        if: always() && github.event_name == 'pull_request' && hashFiles('conformance-summary.md') != ''
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: conformance
          path: conformance-summary.md
      - name: Fail job if conformance failed
        if: steps.conformance.outputs.exit != '0'
        run: exit 1

  benchmark:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test-rust, test-node, test-conformance, detect-changes, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
      # Distinct cache key from the `build` job: this job builds with
      # the full-LTO release profile so benchmark numbers reflect the
      # binaries published to npm. Sharing the `napi-build` key would
      # poison the fast-PR cache with full-LTO artifacts.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: napi-build-fulllto
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build crates (full-LTO release profile)
        # Mirrors the gating in `Run benchmarks and generate report`:
        # if neither a full-bench commit nor any changed crates, skip
        # the build (the next step exits 0 on the same condition).
        run: |
          set -euo pipefail
          if [ "${{ needs.detect-changes.outputs.fullbench }}" = "1" ]; then
            pnpm -r --workspace-concurrency=4 run build
          elif [ -n "${{ needs.detect-changes.outputs.crates }}" ]; then
            filters=""
            for c in $(echo "${{ needs.detect-changes.outputs.crates }}" | tr ',' ' '); do
              filters="$filters --filter @amigo-labs/$c"
            done
            pnpm $filters --workspace-concurrency=4 run build
          else
            echo "No crates changed and not a full-bench commit; skipping build."
          fi
      - name: Run benchmarks and generate report
        run: |
          if [ "${{ needs.detect-changes.outputs.fullbench }}" = "1" ]; then
            node scripts/run-benchmarks.mjs
          elif [ -n "${{ needs.detect-changes.outputs.crates }}" ]; then
            node scripts/run-benchmarks.mjs --crates "${{ needs.detect-changes.outputs.crates }}"
          else
            echo "No crates changed; skipping benchmarks, size, parity, and report."
            exit 0
          fi
          node scripts/measure-size.mjs
          node scripts/parity-report.mjs
          node scripts/generate-report.mjs
      - name: Commit shards + history + aggregate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/benchmarks/ docs/history/ docs/data.json docs/packages.json
          git diff --cached --quiet || git commit -m "docs: update benchmarks [skip ci]"
          git push
