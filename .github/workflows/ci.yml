name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  # ── change detection ────────────────────────────────────────────────────
  # Runs first so per-crate jobs can decide whether to skip. Outputs:
  #   crates       — comma-separated list of changed crate dirs (excluding
  #                  `_template` and other underscore-prefixed entries).
  #   rebuildall   — "1" when any workspace-wide signal changed (root
  #                  Cargo.toml/Cargo.lock, pnpm-lock.yaml, .github/, the
  #                  template dir, or `[full-build]` in the commit msg).
  #                  Forces all crates to be built and tested.
  #   fullbench    — "1" when `[full-bench]` is in the commit message.
  #                  Consumed only by the benchmark job.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.detect.outputs.crates }}
      rebuildall: ${{ steps.detect.outputs.rebuildall }}
      fullbench: ${{ steps.detect.outputs.fullbench }}
    steps:
      - uses: actions/checkout@v6
        with:
          # PRs need full history to diff against the base branch; pushes
          # to main only need the parent commit.
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 2 }}
      - id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "$BASE_REF" --depth=1 --no-tags
            files=$(git diff --name-only "origin/$BASE_REF...HEAD")
            commit_msg=$(git log -1 --format=%B HEAD)
          else
            files=$(git diff --name-only HEAD^..HEAD)
            commit_msg=$(git log -1 --format=%B HEAD)
          fi

          # Workspace-wide changes that invalidate every crate's build.
          if echo "$files" | grep -qE '^(Cargo\.toml|Cargo\.lock|pnpm-lock\.yaml|pnpm-workspace\.yaml|\.github/workflows/|\.cargo/|crates/_template/)'; then
            rebuildall=1
          elif echo "$commit_msg" | grep -qF '[full-build]'; then
            rebuildall=1
          else
            rebuildall=0
          fi

          # Per-crate changes (excludes `_template` and any other underscore-
          # prefixed crate dirs).
          crates=$(echo "$files" \
            | { grep -E '^crates/[^_][^/]*/' || true; } \
            | sed -E 's|^crates/([^/]+)/.*|\1|' \
            | sort -u \
            | paste -sd, -)

          if echo "$commit_msg" | grep -qF '[full-bench]'; then
            fullbench=1
          else
            fullbench=0
          fi

          echo "crates=$crates" >> "$GITHUB_OUTPUT"
          echo "rebuildall=$rebuildall" >> "$GITHUB_OUTPUT"
          echo "fullbench=$fullbench" >> "$GITHUB_OUTPUT"
          echo "Detected changed crates: ${crates:-<none>}"
          echo "Rebuild-all: $rebuildall"
          echo "Full-bench: $fullbench"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-test
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check crate registry is in sync
        run: node scripts/sync-registry.mjs --check
      - run: pnpm run lint

  audit-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # taiki-e/install-action downloads a prebuilt cargo-audit binary
      # from the upstream release page (~3s) and caches it across runs;
      # `cargo install --locked cargo-audit` rebuilt it from source on
      # every push (~2 minutes plus crates.io flake risk).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo audit --deny warnings

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-test
      - run: cargo test --workspace

  build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.rebuildall == '1' || needs.detect-changes.outputs.crates != ''
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: napi-build
      - uses: rui314/setup-mold@v1
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build crates
        # CI overrides the workspace `[profile.release]` (lto = true,
        # codegen-units = 1) with thin-LTO + 16 codegen-units via env
        # vars. Per-crate codegen is the dominant cost and goes from
        # single-threaded to parallel; mold replaces ld for a faster
        # link step. release.yml is unaffected — its builds inherit
        # Cargo.toml's full-LTO profile and ship to npm unchanged.
        # The benchmark job re-builds with full-LTO so its numbers
        # remain representative of the published binaries.
        #
        # `--workspace-concurrency=4` matches the GitHub-hosted Ubuntu
        # runner's 4 vCPUs. When only a subset of crates changed we
        # filter to those — the `Swatinem/rust-cache` step still warms
        # the workspace target/ so dependency compilation is shared
        # across runs.
        env:
          CARGO_PROFILE_RELEASE_LTO: "thin"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
        run: |
          set -euo pipefail
          if [ "${{ needs.detect-changes.outputs.rebuildall }}" = "1" ]; then
            echo "::notice::Building all crates (rebuildall=1)"
            pnpm -r --workspace-concurrency=4 run build
          else
            echo "::notice::Building only: ${{ needs.detect-changes.outputs.crates }}"
            # commonmark is always built — `test-node` runs
            # render-readmes.mjs which requires the commonmark binary,
            # so partial builds that don't touch commonmark would
            # otherwise leave the artifact missing it.
            filters="--filter @amigo-labs/commonmark"
            for c in $(echo "${{ needs.detect-changes.outputs.crates }}" | tr ',' ' '); do
              filters="$filters --filter @amigo-labs/$c"
            done
            pnpm $filters --workspace-concurrency=4 run build
          fi
      - name: Upload NAPI binaries
        uses: actions/upload-artifact@v7
        with:
          name: napi-binaries
          path: |
            crates/*/*.node
            crates/*/index.js
            crates/*/index.d.ts
          retention-days: 1
          if-no-files-found: error

  test-node:
    runs-on: ubuntu-latest
    needs: [build, detect-changes]
    if: needs.detect-changes.outputs.rebuildall == '1' || needs.detect-changes.outputs.crates != ''
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download NAPI binaries
        uses: actions/download-artifact@v8
        with:
          name: napi-binaries
          path: crates/
      - name: Check rendered READMEs are in sync
        run: node scripts/render-readmes.mjs --check
      - name: Test crates
        run: |
          set -euo pipefail
          if [ "${{ needs.detect-changes.outputs.rebuildall }}" = "1" ]; then
            pnpm -r run test
          else
            filters=""
            for c in $(echo "${{ needs.detect-changes.outputs.crates }}" | tr ',' ' '); do
              filters="$filters --filter @amigo-labs/$c"
            done
            pnpm $filters run test
          fi
      - name: Parity tests
        run: pnpm test:parity

  test-conformance:
    runs-on: ubuntu-latest
    needs: [build, detect-changes]
    if: needs.detect-changes.outputs.rebuildall == '1' || needs.detect-changes.outputs.crates != ''
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download NAPI binaries
        uses: actions/download-artifact@v8
        with:
          name: napi-binaries
          path: crates/
      - name: Run conformance suite + summary
        id: conformance
        # Summary script exits non-zero on any failure; capture the
        # status so we still post the comment, then re-fail at the end.
        run: |
          set +e
          if [ "${{ needs.detect-changes.outputs.rebuildall }}" = "1" ]; then
            node scripts/conformance-summary.mjs
          else
            node scripts/conformance-summary.mjs --crates "${{ needs.detect-changes.outputs.crates }}"
          fi
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          set -e
      - name: Append summary to GITHUB_STEP_SUMMARY
        if: always() && hashFiles('conformance-summary.md') != ''
        run: cat conformance-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Post conformance summary as PR comment
        if: always() && github.event_name == 'pull_request' && hashFiles('conformance-summary.md') != ''
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: conformance
          path: conformance-summary.md
      - name: Fail job if conformance failed
        if: steps.conformance.outputs.exit != '0'
        run: exit 1

  benchmark:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test-rust, test-node, test-conformance, detect-changes, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
      # Distinct cache key from the `build` job: this job builds with
      # the full-LTO release profile so benchmark numbers reflect the
      # binaries published to npm. Sharing the `napi-build` key would
      # poison the fast-PR cache with full-LTO artifacts.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: napi-build-fulllto
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build crates (full-LTO release profile)
        # Mirrors the gating in `Run benchmarks and generate report`:
        # if neither a full-bench commit nor any changed crates, skip
        # the build (the next step exits 0 on the same condition).
        run: |
          set -euo pipefail
          if [ "${{ needs.detect-changes.outputs.fullbench }}" = "1" ]; then
            pnpm -r --workspace-concurrency=4 run build
          elif [ -n "${{ needs.detect-changes.outputs.crates }}" ]; then
            filters=""
            for c in $(echo "${{ needs.detect-changes.outputs.crates }}" | tr ',' ' '); do
              filters="$filters --filter @amigo-labs/$c"
            done
            pnpm $filters --workspace-concurrency=4 run build
          else
            echo "No crates changed and not a full-bench commit; skipping build."
          fi
      - name: Run benchmarks and generate report
        run: |
          if [ "${{ needs.detect-changes.outputs.fullbench }}" = "1" ]; then
            node scripts/run-benchmarks.mjs
          elif [ -n "${{ needs.detect-changes.outputs.crates }}" ]; then
            node scripts/run-benchmarks.mjs --crates "${{ needs.detect-changes.outputs.crates }}"
          else
            echo "No crates changed; skipping benchmarks, size, parity, and report."
            exit 0
          fi
          node scripts/measure-size.mjs
          node scripts/parity-report.mjs
          node scripts/generate-report.mjs
      - name: Commit shards + history + aggregate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/benchmarks/ docs/history/ docs/data.json docs/packages.json
          git diff --cached --quiet || git commit -m "docs: update benchmarks [skip ci]"
          git push
