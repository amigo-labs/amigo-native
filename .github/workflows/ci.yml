name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-test
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check crate registry is in sync
        run: node scripts/sync-registry.mjs --check
      - run: pnpm run lint

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-test
      - run: cargo test --workspace

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: napi-build
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build all crates
        run: pnpm -r run build
      - name: Upload NAPI binaries
        uses: actions/upload-artifact@v4
        with:
          name: napi-binaries
          path: |
            crates/*/*.node
            crates/*/index.js
            crates/*/index.d.ts
          retention-days: 1
          if-no-files-found: error

  test-node:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download NAPI binaries
        uses: actions/download-artifact@v4
        with:
          name: napi-binaries
          path: crates/
      - name: Test all crates
        run: pnpm -r run test
      - name: Parity tests
        run: pnpm test:parity

  test-conformance:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download NAPI binaries
        uses: actions/download-artifact@v4
        with:
          name: napi-binaries
          path: crates/
      - name: Run conformance suite + summary
        id: conformance
        # Summary script exits non-zero on any failure; use `|| true` so we
        # still post the comment. The `conformance: fail` detection below
        # re-fails the step.
        run: |
          set +e
          pnpm test:conformance:summary
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          set -e
      - name: Append summary to GITHUB_STEP_SUMMARY
        if: always() && hashFiles('conformance-summary.md') != ''
        run: cat conformance-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Post conformance summary as PR comment
        if: always() && github.event_name == 'pull_request' && hashFiles('conformance-summary.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: conformance
          path: conformance-summary.md
      - name: Fail job if conformance failed
        if: steps.conformance.outputs.exit != '0'
        run: exit 1

  detect-changes:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.detect.outputs.crates }}
      fullbench: ${{ steps.detect.outputs.fullbench }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - id: detect
        run: |
          # `set -o pipefail` (GitHub Actions default) makes grep's exit=1 on
          # no match fail the whole pipeline, so the second grep-based gate
          # is written as an `if` block and this one is tolerated explicitly.
          crates=$(git diff --name-only HEAD^..HEAD \
            | { grep -E '^crates/[^_][^/]*/' || true; } \
            | sed -E 's|^crates/([^/]+)/.*|\1|' \
            | sort -u \
            | paste -sd, -)
          echo "crates=$crates" >> "$GITHUB_OUTPUT"
          if git log -1 --format=%B | grep -qF '[full-bench]'; then
            echo "fullbench=1" >> "$GITHUB_OUTPUT"
          else
            echo "fullbench=0" >> "$GITHUB_OUTPUT"
          fi

  benchmark:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test-rust, test-node, test-conformance, detect-changes, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download NAPI binaries
        uses: actions/download-artifact@v4
        with:
          name: napi-binaries
          path: crates/
      - name: Run benchmarks and generate report
        run: |
          if [ "${{ needs.detect-changes.outputs.fullbench }}" = "1" ]; then
            node scripts/run-benchmarks.mjs
          elif [ -n "${{ needs.detect-changes.outputs.crates }}" ]; then
            node scripts/run-benchmarks.mjs --crates "${{ needs.detect-changes.outputs.crates }}"
          else
            echo "No crates changed; skipping benchmarks, size, parity, and report."
            exit 0
          fi
          node scripts/measure-size.mjs
          node scripts/parity-report.mjs
          node scripts/generate-report.mjs
      - name: Commit shards + history + aggregate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/benchmarks/ docs/history/ docs/data.json docs/packages.json
          git diff --cached --quiet || git commit -m "docs: update benchmarks [skip ci]"
          git push
