name: Deploy Cloudflare Worker (docs)

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'docs/**'
      - 'wrangler.toml'
      - '.github/workflows/cloudflare.yml'

permissions:
  contents: read

concurrency:
  group: cloudflare-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Mirrors the layout the GitHub Pages workflow used to build:
      #   _site/                  ← main's docs always live at the root
      #   _site/preview/<slug>/   ← branch preview when this push isn't main
      # Pushes on main deploy main only; previews from other branches are
      # republished the next time their own branch is pushed.
      - name: Assemble _site
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p _site

          git worktree add /tmp/main-docs origin/main
          cp -r /tmp/main-docs/docs/. _site/

          if [ "$REF_NAME" != "main" ]; then
            slug=$(echo "$REF_NAME" | sed 's|/|-|g')
            mkdir -p "_site/preview/$slug"
            cp -r docs/. "_site/preview/$slug/"
            {
              echo '<!DOCTYPE html><meta charset="utf-8"><title>Preview</title>'
              echo '<style>body{font-family:monospace;background:#0A0B0D;color:#E8E6E2;padding:32px}a{color:#FF6B2B}</style>'
              echo "<h1>Preview: $REF_NAME</h1>"
              echo "<p><a href=\"./$slug/\">open &rarr;</a></p>"
            } > _site/preview/index.html
          fi

          echo "Built _site:"
          ls -la _site
          [ -d _site/preview ] && ls -la _site/preview || true

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
