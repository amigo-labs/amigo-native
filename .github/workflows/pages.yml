name: Deploy Pages

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build site (main + triggering preview branch, if any)
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p _site

          # 1. main's docs are always the site root
          git worktree add /tmp/main-docs origin/main
          cp -r /tmp/main-docs/docs/. _site/

          # 2. If this push was on a claude/** branch, add only that branch as preview.
          #    Pushes on main deploy main-only; previews from other branches will be
          #    republished next time their own branch is pushed.
          if [ "$REF_NAME" != "main" ]; then
            slug=$(echo "$REF_NAME" | sed 's|/|-|g')
            mkdir -p "_site/preview/$slug"
            cp -r docs/. "_site/preview/$slug/"
            {
              echo '<!DOCTYPE html><meta charset="utf-8"><title>Preview</title>'
              echo '<style>body{font-family:monospace;background:#0A0B0D;color:#E8E6E2;padding:32px}a{color:#FF6B2B}</style>'
              echo "<h1>Preview: $REF_NAME</h1>"
              echo "<p><a href=\"./$slug/\">open &rarr;</a></p>"
            } > _site/preview/index.html
          fi

          echo "Built _site:"
          ls -la _site
          [ -d _site/preview ] && ls -la _site/preview || true

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
