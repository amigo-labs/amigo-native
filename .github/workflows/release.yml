name: Release

on:
  push:
    tags:
      - '*@*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            host: ubuntu-latest
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
          - target: x86_64-apple-darwin
            host: macos-latest
          - target: aarch64-apple-darwin
            host: macos-latest
          - target: x86_64-pc-windows-msvc
            host: windows-latest
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Determine crate from tag
        id: crate
        shell: bash
        run: echo "name=$(echo '${{ github.ref_name }}' | sed 's/@.*//')" >> "$GITHUB_OUTPUT"

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (Docker)
        if: matrix.docker
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.docker }}
          options: '--user 0:0 -v ${{ github.workspace }}/.cargo-cache/git/db:/usr/local/cargo/git/db -v ${{ github.workspace }}/.cargo/registry/cache:/usr/local/cargo/registry/cache -v ${{ github.workspace }}/.cargo/registry/index:/usr/local/cargo/registry/index -v ${{ github.workspace }}:/build -w /build'
          run: |
            corepack enable
            pnpm --filter @amigo-labs/${{ steps.crate.outputs.name }} run build --target ${{ matrix.target }}

      - name: Build (Native)
        if: ${{ !matrix.docker }}
        shell: bash
        run: pnpm --filter @amigo-labs/${{ steps.crate.outputs.name }} run build --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/${{ steps.crate.outputs.name }}/*.node
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Determine crate from tag
        id: crate
        run: echo "name=$(echo '${{ github.ref_name }}' | sed 's/@.*//')" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts
        run: |
          pnpm --filter @amigo-labs/${{ steps.crate.outputs.name }} run artifacts --output-dir artifacts

      - name: List packages
        run: ls -R crates/${{ steps.crate.outputs.name }}/npm/

      - name: Publish platform packages
        shell: bash
        run: |
          for dir in crates/${{ steps.crate.outputs.name }}/npm/*/; do
            if [ -f "$dir/package.json" ] && ls "$dir"/*.node 1>/dev/null 2>&1; then
              echo "Publishing $(basename $dir)..."
              cd "$dir"
              npm publish --provenance --access public
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          cd crates/${{ steps.crate.outputs.name }}
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
