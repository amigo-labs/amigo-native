name: Release

on:
  push:
    tags:
      - '*@*'
  workflow_dispatch:
    inputs:
      package:
        description: Package to release
        required: true
        type: choice
        # List synced from crates/ by scripts/sync-registry.mjs (CI enforces via --check).
        options:
          # PACKAGES:START
          - argon2
          - bm25
          - commonmark
          - csv
          - deepmerge
          - diff
          - encoding
          - file-type
          - force-layout
          - fuse
          - graph-layout
          - inflate
          - jimp
          - jose
          - jpeg-js
          - jwt
          - language-detect
          - linkify-it
          - minisearch
          - pdf
          - pdf-parse
          - pixelmatch
          - pngjs
          - sanitize-html
          - sentences
          - slugify
          - stemmer
          - svgo
          - text-splitters
          - tldts
          - turndown
          - typst
          - xlsx
          - xxhash
          - zip
          - zstd
          # PACKAGES:END
      version:
        description: Version to publish (e.g. 0.1.0)
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: '24'
  # Crates that intentionally stay Node.js-only and never get a WASM build.
  # Mirrors NODE_ONLY_CRATES in ci.yml and in audit-crates.
  NODE_ONLY_CRATES: 'argon2 jose jwt'

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      crate: ${{ steps.resolve.outputs.name }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve package name and version
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.ref_name }}"
            echo "name=$(echo "$TAG" | sed 's/@.*//')" >> "$GITHUB_OUTPUT"
            echo "version=$(echo "$TAG" | sed 's/.*@//')" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            host: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
          - target: x86_64-apple-darwin
            host: macos-latest
          - target: aarch64-apple-darwin
            host: macos-latest
          - target: x86_64-pc-windows-msvc
            host: windows-latest
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          # Rust explicitly passes -lgcc_s when linking cdylib targets, but the
          # musl toolchain only ships the static libgcc.a. Create a linker script
          # that redirects -lgcc_s to the static archive.
          sudo sh -c 'echo "GROUP ( libgcc.a )" > /usr/lib/x86_64-linux-musl/libgcc_s.so'

      - name: Build
        shell: bash
        run: pnpm --filter @amigo-labs/${{ needs.resolve.outputs.crate }} run build --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: crates/${{ needs.resolve.outputs.crate }}/*.node
          if-no-files-found: error

  publish:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Set version
        run: |
          cd crates/${{ needs.resolve.outputs.crate }}
          npm version ${{ needs.resolve.outputs.version }} --no-git-tag-version --allow-same-version
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              (cd "$dir" && npm version ${{ needs.resolve.outputs.version }} --no-git-tag-version --allow-same-version)
            fi
          done

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Move artifacts
        run: |
          pnpm --filter @amigo-labs/${{ needs.resolve.outputs.crate }} run artifacts --output-dir ../../artifacts

      - name: List packages
        run: ls -R crates/${{ needs.resolve.outputs.crate }}/npm/

      # ── WASM build (skipped for the Node.js server-only group) ──────────
      # Builds the in-tarball WASM artifact via wasm-pack and runs
      # wasm-opt -Oz to shrink the published payload. The crate's
      # package.json `files` field ships wasm/pkg/* alongside the napi
      # platform stubs, so the single `npm publish` below carries both.
      - name: Set up Rust for WASM
        if: ${{ !contains(fromJSON('["argon2","jose","jwt"]'), needs.resolve.outputs.crate) }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack and binaryen
        if: ${{ !contains(fromJSON('["argon2","jose","jwt"]'), needs.resolve.outputs.crate) }}
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Build WASM artifact
        if: ${{ !contains(fromJSON('["argon2","jose","jwt"]'), needs.resolve.outputs.crate) }}
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter @amigo-labs/${{ needs.resolve.outputs.crate }} run build:wasm
          wasm=$(ls crates/${{ needs.resolve.outputs.crate }}/wasm/pkg/*_bg.wasm | head -1)
          wasm-opt -Oz "$wasm" -o "$wasm.opt"
          mv "$wasm.opt" "$wasm"
          gz=$(gzip -c "$wasm" | wc -c)
          echo "WASM artifact gzipped: ${gz} B"

      # After configuring trusted publishing for all packages, you can remove
      # NODE_AUTH_TOKEN and add "npm install -g npm@latest" to switch to OIDC.
      # See: scripts/setup-trusted-publishing.sh
      - name: Publish platform packages
        shell: bash
        run: |
          for dir in crates/${{ needs.resolve.outputs.crate }}/npm/*/; do
            if [ -f "$dir/package.json" ] && ls "$dir"/*.node 1>/dev/null 2>&1; then
              echo "Publishing $(basename $dir)..."
              cd "$dir"
              npm publish --provenance --access public || echo "Already published, skipping $(basename $dir)"
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          cd crates/${{ needs.resolve.outputs.crate }}
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
