name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

# All write actions (committing the Release PR branch, pushing tags, creating
# GitHub Releases) are performed by RELEASE_PLEASE_TOKEN, not GITHUB_TOKEN —
# so the workflow's own GITHUB_TOKEN can stay read-only.

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # PAT or GitHub-App token. The default GITHUB_TOKEN cannot push tags
          # that trigger another workflow, so release.yml's tag trigger would
          # silently no-op. See docs/RELEASING.md for setup details.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Summarize released paths
        if: steps.release.outputs.releases_created == 'true'
        run: echo '${{ steps.release.outputs.paths_released }}' | jq -r '.[]'
