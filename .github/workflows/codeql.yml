# Advanced-setup CodeQL workflow.
#
# Replaces the GitHub-managed default-setup workflow so we can pass a
# config file (`.github/codeql/codeql-config.yml`) that filters out the
# `rust/access-invalid-pointer` false-positive on every
# `#[napi] pub struct …` macro expansion. See the config file for the
# full justification.
#
# To revert to default setup: delete this workflow + the codeql-config
# file, then re-enable default setup in
# Settings → Code security → Code scanning.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly baseline scan on the default branch — matches GitHub's
    # default-setup schedule cadence so we keep the same coverage.
    - cron: '0 12 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
